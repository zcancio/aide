<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIde Flight Recorder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow: hidden; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
button:focus { outline: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// Tier colors
const TC = {
  L2: { bg: "#0c4a6e", tx: "#7dd3fc", bd: "#0369a1", lb: "L2 Haiku" },
  L3: { bg: "#4c1d95", tx: "#c4b5fd", bd: "#6d28d9", lb: "L3 Sonnet" },
  L4: { bg: "#713f12", tx: "#fde68a", bd: "#a16207", lb: "L4 Opus" }
};

// Tool call colors
const TOOL_COLORS = {
  "entity.create": { bg: "#064e3b", tx: "#6ee7b7", bd: "#047857" },
  "entity.update": { bg: "#1e3a5f", tx: "#93c5fd", bd: "#2563eb" },
  "entity.remove": { bg: "#4c0519", tx: "#fda4af", bd: "#be123c" },
  "schema.create": { bg: "#422006", tx: "#fdba74", bd: "#c2410c" },
  "schema.update": { bg: "#3b1f63", tx: "#c4b5fd", bd: "#7c3aed" },
  "meta.set": { bg: "#422006", tx: "#fdba74", bd: "#c2410c" },
  "voice": { bg: "#1a2e05", tx: "#bef264", bd: "#4d7c0f" },
};

const mono = "ui-monospace, 'SF Mono', Monaco, Consolas, monospace";

// Parse tool calls from text blocks
function extractToolCalls(textBlocks) {
  if (!textBlocks || textBlocks.length === 0) return [];
  const calls = [];
  textBlocks.forEach(block => {
    if (typeof block === 'object' && block.type === 'tool_use') {
      calls.push({
        type: block.name || 'unknown',
        id: block.input?.id || block.input?.ref || null,
        input: block.input
      });
    }
  });
  return calls;
}

// Compute snapshot diff
function computeDiff(before, after) {
  const bEnts = before?.entities || {};
  const aEnts = after?.entities || {};
  const bk = new Set(Object.keys(bEnts));
  const ak = new Set(Object.keys(aEnts));

  const add = [...ak].filter(k => !bk.has(k));
  const rem = [...bk].filter(k => !ak.has(k));
  const mod = [];
  const modDetails = {};

  for (const k of ak) {
    if (!bk.has(k)) continue;
    const bp = JSON.stringify(bEnts[k]?.p || {});
    const ap = JSON.stringify(aEnts[k]?.p || {});
    if (bp !== ap) {
      mod.push(k);
      const bObj = bEnts[k]?.p || {};
      const aObj = aEnts[k]?.p || {};
      const changed = [];
      const allKeys = new Set([...Object.keys(bObj), ...Object.keys(aObj)]);
      for (const pk of allKeys) {
        if (JSON.stringify(bObj[pk]) !== JSON.stringify(aObj[pk])) {
          changed.push(bObj[pk] === undefined ? `+${pk}` : aObj[pk] === undefined ? `-${pk}` : `${pk}`);
        }
      }
      modDetails[k] = changed;
    }
  }

  return { add, rem, mod, modDetails };
}

// Build entity tree
function buildTree(entities) {
  if (!entities) return [];
  const all = Object.values(entities).filter(e => e && e.id);
  const ch = {};
  all.forEach(e => {
    const p = e.parent || "root";
    (ch[p] = ch[p] || []).push(e);
  });
  const out = [];
  const walk = (pid, d) => {
    (ch[pid] || []).forEach(c => {
      out.push({ ...c, depth: d });
      walk(c.id, d + 1);
    });
  };
  walk("root", 0);
  return out;
}

function Viewer() {
  const [data, setData] = useState(null);
  const [idx, setIdx] = useState(0);
  const [tab, setTab] = useState("rendered");
  const [playing, setPlaying] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [aideIdInput, setAideIdInput] = useState("");
  const fileRef = useRef(null);

  // Load from API
  const loadFromAPI = useCallback(async (aideId) => {
    setLoading(true);
    setError(null);
    try {
      const res = await fetch(`/api/aides/${aideId}/telemetry`, {
        credentials: 'include'
      });
      if (!res.ok) {
        throw new Error(res.status === 404 ? 'Aide not found' : 'Failed to load telemetry');
      }
      const telemetry = await res.json();
      setData(telemetry);
      setIdx(0);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  }, []);

  // Load from file
  const loadFromFile = useCallback((file) => {
    setLoading(true);
    setError(null);
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        setData(d);
        setIdx(0);
      } catch (err) {
        setError('Invalid JSON file');
      } finally {
        setLoading(false);
      }
    };
    r.readAsText(file);
  }, []);

  // Playback
  useEffect(() => {
    if (!playing || !data) return;
    const id = setInterval(() => {
      setIdx(p => {
        if (p >= data.turns.length - 1) {
          setPlaying(false);
          return p;
        }
        return p + 1;
      });
    }, 2500);
    return () => clearInterval(id);
  }, [playing, data]);

  // Keyboard shortcuts
  useEffect(() => {
    if (!data) return;
    const fn = e => {
      if (e.target.tagName === "INPUT") return;
      if (e.key === "ArrowRight") {
        setIdx(p => Math.min(p + 1, data.turns.length - 1));
        setPlaying(false);
      } else if (e.key === "ArrowLeft") {
        setIdx(p => Math.max(p - 1, 0));
        setPlaying(false);
      } else if (e.key === " ") {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.key >= "1" && e.key <= "6") {
        const tabs = ["rendered", "raw", "diff", "tree", "prompt", "cost"];
        setTab(tabs[+e.key - 1]);
      }
    };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, [data]);

  const Tier = ({ tier, small }) => {
    const c = TC[tier] || TC.L3;
    return (
      <span style={{ padding: small ? "1px 5px" : "2px 7px", borderRadius: 3, background: c.bg, border: `1px solid ${c.bd}`, color: c.tx, fontWeight: 600, fontSize: small ? 9 : 11, fontFamily: mono, display: "inline-block" }}>
        {c.lb}
      </span>
    );
  };

  const Lbl = ({ children }) => (
    <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: 1.5, color: "#64748b", marginBottom: 8, fontWeight: 700, fontFamily: mono }}>
      {children}
    </div>
  );

  const Pre = ({ text, mh }) => (
    <pre style={{ background: "#08080f", border: "1px solid #1e1e2e", borderRadius: 6, padding: 12, fontSize: 12, lineHeight: 1.6, fontFamily: mono, color: "#c9d1d9", overflow: "auto", maxHeight: mh || 9999, whiteSpace: "pre-wrap", wordBreak: "break-word", margin: 0 }}>
      {text || "(empty)"}
    </pre>
  );

  // Landing page
  if (!data) {
    return (
      <div style={{ width: "100%", height: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#0b0b13", color: "#e2e8f0", fontFamily: "system-ui, sans-serif", gap: 24 }}>
        <div style={{ fontSize: 28, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: "#94a3b8", fontFamily: mono }}>
          Flight Recorder
        </div>

        {error && (
          <div style={{ padding: "12px 20px", background: "#4c0519", border: "1px solid #be123c", borderRadius: 6, color: "#fda4af", fontSize: 14 }}>
            {error}
          </div>
        )}

        {/* Load from API */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12, width: 400 }}>
          <Lbl>Load from API</Lbl>
          <div style={{ display: "flex", gap: 8 }}>
            <input
              type="text"
              placeholder="Aide ID (UUID)"
              value={aideIdInput}
              onChange={e => setAideIdInput(e.target.value)}
              style={{ flex: 1, padding: "8px 12px", fontSize: 13, background: "#1e293b", border: "1px solid #334155", borderRadius: 4, color: "#e2e8f0", fontFamily: mono }}
            />
            <button
              onClick={() => aideIdInput && loadFromAPI(aideIdInput)}
              disabled={loading || !aideIdInput}
              style={{ padding: "8px 16px", fontSize: 13, background: "#3b82f6", border: "1px solid #2563eb", borderRadius: 4, color: "#fff", cursor: loading ? "wait" : "pointer", fontWeight: 600 }}
            >
              {loading ? "Loading..." : "Load"}
            </button>
          </div>
        </div>

        {/* Load from file */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12, width: 400 }}>
          <Lbl>Upload JSON File</Lbl>
          <button
            onClick={() => fileRef.current?.click()}
            disabled={loading}
            style={{ padding: "8px 16px", fontSize: 13, background: "#1e293b", border: "1px solid #334155", borderRadius: 4, color: "#94a3b8", cursor: "pointer", fontWeight: 600 }}
          >
            Choose File
          </button>
          <input
            ref={fileRef}
            type="file"
            accept=".json"
            onChange={e => {
              const f = e.target.files?.[0];
              if (f) loadFromFile(f);
            }}
            style={{ display: "none" }}
          />
        </div>
      </div>
    );
  }

  const turns = data.turns || [];
  const N = turns.length;
  const t = turns[idx];
  const toolCalls = extractToolCalls(t.tool_calls);
  const textBlocks = t.text_blocks || [];

  // Build snapshots from turns (simplified - just show validation data if available)
  const beforeSnap = idx > 0 ? (turns[idx - 1].validation?.snapshot_after || {}) : {};
  const afterSnap = t.validation?.snapshot_after || {};
  const diff = computeDiff(beforeSnap, afterSnap);
  const tree = buildTree(afterSnap.entities);

  return (
    <div style={{ width: "100%", height: "100vh", display: "grid", gridTemplateRows: "44px 1fr 48px", gridTemplateColumns: "280px 1fr 220px", background: "#0b0b13", color: "#e2e8f0", fontFamily: "system-ui, sans-serif", overflow: "hidden" }}>

      {/* TOP BAR */}
      <div style={{ gridColumn: "1/-1", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 16px", borderBottom: "1px solid #1a1a2a", background: "#0e0e18" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: playing ? "#ef4444" : "#4ade80" }} />
          <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: "#64748b", fontFamily: mono }}>
            Flight Recorder
          </span>
          <span style={{ fontSize: 13, color: "#94a3b8" }}>{data.name || data.aide_id}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 12, color: "#64748b", fontFamily: mono }}>
            Turn {idx + 1}/{N}
          </span>
          <Tier tier={t.tier} />
          <span style={{ fontSize: 11, color: "#475569", fontFamily: mono }}>
            {t.ttfc_ms != null ? t.ttfc_ms + "ms ttft · " : ""}{t.ttc_ms}ms ttc · {t.usage?.output_tokens || 0}tok
          </span>
          <button onClick={() => { setData(null); setIdx(0); }} style={{ padding: "3px 8px", fontSize: 10, background: "#1e293b", border: "1px solid #334155", borderRadius: 4, color: "#94a3b8", cursor: "pointer", fontFamily: mono }}>
            Back
          </button>
        </div>
      </div>

      {/* LEFT: CHAT */}
      <div style={{ borderRight: "1px solid #1a1a2a", overflowY: "auto", padding: 12 }}>
        <Lbl>Conversation</Lbl>
        {turns.slice(0, idx + 1).map((tr, i) => (
          <div key={i} onClick={() => { setIdx(i); setPlaying(false); }} style={{ cursor: "pointer", marginBottom: 12, opacity: i === idx ? 1 : 0.3 }}>
            <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 3 }}>
              <div style={{ maxWidth: "92%", padding: "6px 10px", borderRadius: "10px 10px 3px 10px", background: "#1a1a2e", color: "#cbd5e1", fontSize: 12.5, lineHeight: 1.4 }}>
                {tr.message}
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 2 }}>
              <Tier tier={tr.tier} small />
              <span style={{ fontSize: 9, color: "#64748b", fontFamily: mono }}>
                {tr.ttc_ms}ms
              </span>
            </div>
          </div>
        ))}
      </div>

      {/* CENTER: TABS + CONTENT */}
      <div style={{ display: "grid", gridTemplateRows: "36px 1fr", overflow: "hidden" }}>
        {/* Tab bar */}
        <div style={{ display: "flex", gap: 3, padding: "4px 12px", borderBottom: "1px solid #1a1a2a", background: "#0e0e18", alignItems: "center" }}>
          {["rendered", "raw", "diff", "tree", "prompt", "cost"].map((k, i) => (
            <button key={k} onClick={() => setTab(k)} style={{ padding: "4px 10px", fontSize: 11, fontWeight: tab === k ? 600 : 400, fontFamily: mono, color: tab === k ? "#e2e8f0" : "#64748b", background: tab === k ? "#1e293b" : "transparent", border: tab === k ? "1px solid #334155" : "1px solid transparent", borderRadius: 4, cursor: "pointer" }}>
              {i + 1}. {k[0].toUpperCase() + k.slice(1)}
            </button>
          ))}
        </div>

        {/* Content */}
        <div key={tab + "-" + idx} style={{ overflowY: "auto", padding: 14 }}>

          {tab === "rendered" && (
            <>
              <Lbl>Rendered Snapshot</Lbl>
              {afterSnap.entities ? (
                <div style={{ background: "#ffffff", border: "1px solid #1e1e2e", borderRadius: 6, padding: 16, color: "#2D2D2A", minHeight: 200 }}>
                  <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 12 }}>
                    {afterSnap.meta?.title || "Untitled"}
                  </div>
                  {Object.values(afterSnap.entities || {}).filter(e => e.parent === "root" || e.parent === (afterSnap.entities?.page?.id)).map((e, i) => (
                    <div key={i} style={{ marginBottom: 12, padding: 10, background: "#f8fafc", borderRadius: 4, border: "1px solid #e2e8f0" }}>
                      <div style={{ fontSize: 11, fontFamily: mono, color: "#64748b", marginBottom: 4 }}>
                        {e.id} ({e._schema || e.display || "entity"})
                      </div>
                      {e.p && Object.entries(e.p).map(([k, v]) => (
                        <div key={k} style={{ fontSize: 13, marginBottom: 2 }}>
                          <strong>{k}:</strong> {JSON.stringify(v)}
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{ color: "#64748b", fontSize: 13, padding: 12 }}>
                  No snapshot data available
                </div>
              )}
            </>
          )}

          {tab === "raw" && (
            <>
              <Lbl>Tool Calls</Lbl>
              {toolCalls.length > 0 ? (
                <div style={{ marginBottom: 14, lineHeight: 2.2 }}>
                  {toolCalls.map((tc, i) => {
                    const c = TOOL_COLORS[tc.type] || { bg: "#1e293b", tx: "#94a3b8", bd: "#334155" };
                    return (
                      <span key={i} style={{ display: "inline-block", padding: "2px 7px", borderRadius: 4, background: c.bg, border: `1px solid ${c.bd}`, color: c.tx, fontSize: 11, fontFamily: mono, marginRight: 5, marginBottom: 4 }}>
                        <b>{tc.type}</b>{tc.id ? " " + tc.id : ""}
                      </span>
                    );
                  })}
                </div>
              ) : (
                <div style={{ color: "#64748b", fontSize: 12, marginBottom: 14 }}>
                  No tool calls
                </div>
              )}

              <Lbl>Text Blocks</Lbl>
              {textBlocks.map((block, i) => (
                <div key={i} style={{ marginBottom: 8 }}>
                  {typeof block === 'string' ? (
                    <Pre text={block} mh={100} />
                  ) : (
                    <Pre text={JSON.stringify(block, null, 2)} mh={100} />
                  )}
                </div>
              ))}
            </>
          )}

          {tab === "diff" && (
            <>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div>
                  <Lbl>Before</Lbl>
                  <Pre text={JSON.stringify(beforeSnap, null, 2)} mh={360} />
                </div>
                <div>
                  <Lbl>After</Lbl>
                  <Pre text={JSON.stringify(afterSnap, null, 2)} mh={360} />
                </div>
              </div>
              <div style={{ marginTop: 14 }}>
                <Lbl>Entity Diff</Lbl>
                <div>
                  {diff.add.map(k => (
                    <span key={k} style={{ display: "inline-block", padding: "2px 7px", borderRadius: 4, background: "#064e3b", border: "1px solid #047857", color: "#6ee7b7", fontSize: 11, fontFamily: mono, marginRight: 5, marginBottom: 4 }}>
                      + {k}
                    </span>
                  ))}
                  {diff.mod.map(k => (
                    <span key={k} style={{ display: "inline-block", padding: "2px 7px", borderRadius: 4, background: "#1e3a5f", border: "1px solid #2563eb", color: "#93c5fd", fontSize: 11, fontFamily: mono, marginRight: 5, marginBottom: 4 }} title={(diff.modDetails[k] || []).join(", ")}>
                      ~ {k}
                    </span>
                  ))}
                  {diff.rem.map(k => (
                    <span key={k} style={{ display: "inline-block", padding: "2px 7px", borderRadius: 4, background: "#4c0519", border: "1px solid #be123c", color: "#fda4af", fontSize: 11, fontFamily: mono, marginRight: 5, marginBottom: 4 }}>
                      - {k}
                    </span>
                  ))}
                  {diff.add.length === 0 && diff.rem.length === 0 && diff.mod.length === 0 && (
                    <span style={{ fontSize: 12, color: "#64748b" }}>No entity changes</span>
                  )}
                </div>
              </div>
            </>
          )}

          {tab === "tree" && (
            <>
              <Lbl>Entity Tree — Turn {t.turn}</Lbl>
              {tree.length > 0 ? (
                <div style={{ background: "#08080f", border: "1px solid #1e1e2e", borderRadius: 6, padding: 12 }}>
                  {tree.map((e, i) => {
                    const nw = diff.add.includes(e.id);
                    const md = diff.mod.includes(e.id);
                    const rm = diff.rem.includes(e.id);
                    const clr = rm ? "#f87171" : nw ? "#6ee7b7" : md ? "#93c5fd" : "#cbd5e1";
                    return (
                      <div key={i} style={{ paddingLeft: e.depth * 20, paddingTop: 3, paddingBottom: 3, fontSize: 12, fontFamily: mono, opacity: rm ? 0.5 : 1 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                          <span style={{ color: "#475569" }}>{e.depth > 0 ? "├─" : "◆"}</span>
                          <span style={{ color: clr, fontWeight: nw || md || rm ? 700 : 400, textDecoration: rm ? "line-through" : "none" }}>
                            {e.id}
                          </span>
                          {nw && <span style={{ fontSize: 9, padding: "0 4px", borderRadius: 3, background: "#064e3b", color: "#6ee7b7", border: "1px solid #047857" }}>new</span>}
                          {md && <span style={{ fontSize: 9, padding: "0 4px", borderRadius: 3, background: "#1e3a5f", color: "#93c5fd", border: "1px solid #2563eb" }}>mod</span>}
                          {e._schema && <span style={{ fontSize: 10, padding: "0 4px", marginLeft: 2, borderRadius: 3, background: "#1e293b", color: "#94a3b8" }}>{e._schema}</span>}
                        </div>
                        {e.p && Object.keys(e.p).length > 0 && (
                          <div style={{ paddingLeft: 20, fontSize: 11, color: "#475569", fontFamily: mono }}>
                            {Object.entries(e.p).slice(0, 5).map(([k, v]) => (
                              <span key={k} style={{ marginRight: 8 }}>
                                {k}={JSON.stringify(v).slice(0, 24)}
                              </span>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              ) : (
                <div style={{ color: "#64748b", fontSize: 13, padding: 12, background: "#08080f", border: "1px solid #1e1e2e", borderRadius: 6 }}>
                  No entities
                </div>
              )}
            </>
          )}

          {tab === "prompt" && (
            <>
              <Lbl>System Prompt Sent to Model</Lbl>
              <Pre text={t.system_prompt || "(not recorded)"} mh={600} />
            </>
          )}

          {tab === "cost" && (
            <>
              <Lbl>Token Usage</Lbl>
              <div style={{ background: "#08080f", border: "1px solid #1e1e2e", borderRadius: 6, padding: 12 }}>
                {[
                  ["Input", t.usage?.input_tokens],
                  ["Output", t.usage?.output_tokens],
                  ["Cache Read", t.usage?.cache_read],
                  ["Cache Creation", t.usage?.cache_creation]
                ].map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                    <span style={{ color: "#64748b" }}>{k}</span>
                    <span style={{ fontFamily: mono, color: k === "Cache Read" && v > 0 ? "#4ade80" : "#94a3b8" }}>
                      {v != null ? v.toLocaleString() : "—"}
                    </span>
                  </div>
                ))}
              </div>

              <div style={{ marginTop: 14 }}>
                <Lbl>Cost Breakdown</Lbl>
                {t.usage && (
                  <div style={{ background: "#08080f", border: "1px solid #1e1e2e", borderRadius: 6, padding: 12 }}>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#4ade80", fontFamily: mono, marginBottom: 8 }}>
                      ${t.usage.cost ? t.usage.cost(t.tier).toFixed(4) : "0.0000"}
                    </div>
                    <div style={{ fontSize: 11, color: "#64748b" }}>
                      Tier: {t.tier} · Model: {t.model}
                    </div>
                  </div>
                )}
              </div>
            </>
          )}

        </div>
      </div>

      {/* RIGHT: METRICS */}
      <div style={{ borderLeft: "1px solid #1a1a2a", overflowY: "auto", padding: 12 }}>
        <Lbl>Latency</Lbl>
        {[
          ["TTFT", t.ttfc_ms != null ? t.ttfc_ms + "ms" : "—"],
          ["TTC", t.ttc_ms + "ms"]
        ].map(([k, v]) => (
          <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 3 }}>
            <span style={{ color: "#64748b" }}>{k}</span>
            <span style={{ fontFamily: mono, color: k === "TTFT" ? "#c4b5fd" : "#94a3b8" }}>{v}</span>
          </div>
        ))}

        <div style={{ marginTop: 14 }}>
          <Lbl>Tokens</Lbl>
          {[
            ["In", t.usage?.input_tokens],
            ["Out", t.usage?.output_tokens],
            ["Cache R", t.usage?.cache_read],
            ["Cache W", t.usage?.cache_creation]
          ].map(([k, v]) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 3 }}>
              <span style={{ color: "#64748b" }}>{k}</span>
              <span style={{ fontFamily: mono, color: k === "Cache R" && v > 0 ? "#4ade80" : "#94a3b8" }}>
                {v != null ? v : "—"}
              </span>
            </div>
          ))}
        </div>

        <div style={{ marginTop: 14 }}>
          <Lbl>Routing</Lbl>
          <div style={{ fontSize: 11, marginBottom: 3 }}>
            <Tier tier={t.tier} small />
          </div>
          <div style={{ fontSize: 11, color: "#94a3b8", fontFamily: mono }}>
            {t.model}
          </div>
        </div>

        {t.validation && (
          <div style={{ marginTop: 14 }}>
            <Lbl>Validation</Lbl>
            <div style={{ fontSize: 11, color: "#94a3b8" }}>
              {t.validation.valid ? (
                <span style={{ color: "#4ade80" }}>✓ Valid</span>
              ) : (
                <span style={{ color: "#f87171" }}>✗ Invalid</span>
              )}
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM: TIMELINE */}
      <div style={{ gridColumn: "1/-1", display: "flex", alignItems: "center", gap: 8, padding: "0 16px", borderTop: "1px solid #1a1a2a", background: "#0e0e18" }}>
        <button onClick={() => { setIdx(p => Math.max(p - 1, 0)); setPlaying(false); }} style={{ background: "none", border: "none", color: "#64748b", fontSize: 15, cursor: "pointer" }}>
          ◀
        </button>
        <button onClick={() => setPlaying(p => !p)} style={{ background: "none", border: "none", color: playing ? "#ef4444" : "#4ade80", fontSize: 17, cursor: "pointer", width: 22, textAlign: "center" }}>
          {playing ? "⏸" : "▶"}
        </button>
        <button onClick={() => { setIdx(p => Math.min(p + 1, N - 1)); setPlaying(false); }} style={{ background: "none", border: "none", color: "#64748b", fontSize: 15, cursor: "pointer" }}>
          ▶
        </button>
        <div onClick={e => { const r = e.currentTarget.getBoundingClientRect(); const p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)); setIdx(Math.round(p * (N - 1))); setPlaying(false); }} style={{ flex: 1, height: 28, cursor: "pointer", position: "relative", display: "flex", alignItems: "center" }}>
          <div style={{ position: "absolute", left: 0, right: 0, height: 3, background: "#1e293b", borderRadius: 2 }} />
          <div style={{ position: "absolute", left: 0, width: `${(idx / Math.max(N - 1, 1)) * 100}%`, height: 3, background: "#3b82f6", borderRadius: 2 }} />
          {turns.map((tr, i) => {
            const c = TC[tr.tier] || TC.L3;
            const a = i === idx;
            return (
              <div key={i} style={{ position: "absolute", left: `${(i / Math.max(N - 1, 1)) * 100}%`, transform: "translateX(-50%)" }}>
                <div style={{ width: a ? 12 : 8, height: a ? 12 : 8, borderRadius: "50%", background: a ? c.tx : c.bg, border: `2px solid ${c.bd}` }} />
              </div>
            );
          })}
        </div>
        <span style={{ fontSize: 9, color: "#334155", fontFamily: mono }}>←→ spc 1-6</span>
      </div>

    </div>
  );
}

ReactDOM.render(React.createElement(Viewer), document.getElementById("root"));
</script>
</body>
</html>
